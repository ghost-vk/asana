version: 2

release:
  mode: replace

builds:
  - env: [CGO_ENABLED=0]
    goos: [darwin, linux, windows]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  # Windows users expect .zip; leave darwin/linux on the default tar.gz.
  - format_overrides:
      - goos: windows
        formats: [zip]

homebrew_casks:
  - name: asana
    binaries:
      - asana
    repository:
      owner: ghost-vk
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/ghost-vk/asana"
    description: "Command-line client for Asana"
    # unsigned binary: strip the quarantine bit so it runs without Gatekeeper prompts
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/asana"]
          end
